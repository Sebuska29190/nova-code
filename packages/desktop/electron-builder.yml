appId: com.novacode.app
productName: NovaCode
copyright: Copyright © 2026 NovaCode
forceCodeSigning: false
publish:
  provider: github
  owner: Sebuska29190
  repo: nova-code

directories:
  output: release
  buildResources: resources

# Files to include in the app
files:
  - main/dist/**/*
  - preload/**/*
  - renderer/dist/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,README,readme,LICENSE,license,LICENCE,licence}"
  - "!**/node_modules/*/{test,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"

# ─── Windows ──────────────────────────────────────────────────────────────────

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "NovaCode-Setup-${version}.${ext}"
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NovaCode
  deleteAppDataOnUninstall: false
  runAfterFinish: true

# ─── macOS ────────────────────────────────────────────────────────────────────

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools

# ─── Linux ────────────────────────────────────────────────────────────────────

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  artifactName: "NovaCode-${version}.${ext}"
