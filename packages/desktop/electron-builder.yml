appId: com.novacode.app
productName: NovaCode
copyright: Copyright © 2026 NovaCode
forceCodeSigning: false
publish:
  provider: github
  owner: Sebuska29190
  repo: nova-code

directories:
  output: release
  buildResources: resources

# ─── Windows ──────────────────────────────────────────────────────────────────

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "NovaCode-Setup-${version}.${ext}"
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NovaCode
  deleteAppDataOnUninstall: false
  runAfterFinish: true

# ─── macOS ────────────────────────────────────────────────────────────────────

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools

# ─── Linux ────────────────────────────────────────────────────────────────────

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  artifactName: "NovaCode-${version}.${ext}"
