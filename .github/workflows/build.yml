name: Build & Release NovaCode

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: NovaCode-linux.AppImage
          - os: windows-latest
            platform: win32
            artifact: NovaCode-Setup.exe
          - os: macos-latest
            platform: darwin
            artifact: NovaCode-mac.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build shared
        run: bun run --filter @nova/shared build

      - name: Build engine
        run: bun run --filter @nova/engine build

      - name: Build desktop
        run: bun run --filter @nova/desktop build

      - name: Package with electron-builder
        working-directory: packages/desktop
        run: |
          bunx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/desktop/release/${{ matrix.artifact }}
            packages/desktop/release/*.exe
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.exe
            **/*.AppImage
            **/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
