name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'bun'

      - name: Install dependencies
        run: bun install

      - name: Build shared
        run: bun run --filter @nova/shared build

      - name: Build engine
        run: bun run --filter @nova/engine build

      - name: Build desktop
        working-directory: packages/desktop
        run: bun run build

      - name: Build Electron app (${{ matrix.platform }})
        working-directory: packages/desktop
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaCode-${{ matrix.platform }}
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.dmg
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded files
        run: find . -type f -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.exe
            **/*.dmg
            **/*.AppImage
            **/*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## NovaCode v${{ github.ref_name }}

            ### Download & Install

            **Windows:**
            1. Download `NovaCode-Setup-*.exe`
            2. Run the installer
            3. NovaCode will start automatically

            **macOS:**
            1. Download `NovaCode-*.dmg`
            2. Open and drag to Applications

            **Linux:**
            1. Download `NovaCode-*.AppImage`
            2. `chmod +x NovaCode-*.AppImage && ./NovaCode-*.AppImage`

            ### Auto-Update
            NovaCode checks for updates automatically. You can also check manually in Settings.

            ### First Run
            On first launch, you'll be asked to configure an LLM provider (API key).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
