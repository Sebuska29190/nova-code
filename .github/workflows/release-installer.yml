name: Build & Release Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compile installer
        run: bun run installer/build-installer.ts

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaCode-Setup
          path: release/NovaCode-Setup.exe

  release:
    needs: build-installer
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: NovaCode-Setup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NovaCode-Setup.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## NovaCode Installer

            Download `NovaCode-Setup.exe` and run it. The installer will:

            1. ✅ Check for prerequisites (Git, Node.js, Bun)
            2. 📥 Download NovaCode from GitHub
            3. 📦 Install all dependencies
            4. 🔨 Build the application
            5. 🖥️ Create desktop shortcut
            6. 🚀 Launch NovaCode

            ### Auto-Update

            Run `NovaCode-Setup.exe` again anytime to check for and install updates.
            The installer automatically checks GitHub for new commits.

            ### Manual Install

            ```bash
            git clone https://github.com/Sebuska29190/nova-code.git
            cd nova-code
            bun install
            bun dev
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
